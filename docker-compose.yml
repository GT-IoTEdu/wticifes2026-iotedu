services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iot_edu
      MYSQL_USER: IoT_EDU
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: backend/.env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    restart: unless-stopped


  frontend:
    build: ./frontend
    env_file: backend/.env
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped



  zeek-monitor:
    build: ./zeek-docker
    network_mode: host
    privileged: true
    environment:
      ZEEK_INTERFACE:  bridge-tap
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./logs_zeek/:/usr/local/zeek/spool/zeek
      - ./sites/site_zeek:/usr/local/zeek/share/zeek/site
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  suricata_ids:
    build: ./suricata
    container_name: suricata_ids
    privileged: true
    network_mode: host
    volumes:
      - ./sites/rules_suricata:/var/lib/suricata/rules
      - ./logs_suricata:/var/log/suricata
    command: ["bridge-tap"]
    restart: unless-stopped

