%YAML 1.1
---

suricata-version: '8.0'
vars:
  address-groups:
    HOME_NET: any
    EXTERNAL_NET: any
    HTTP_SERVERS: $HOME_NET
    SMTP_SERVERS: $HOME_NET
    SQL_SERVERS: $HOME_NET
    DNS_SERVERS: $HOME_NET
    TELNET_SERVERS: $HOME_NET
    AIM_SERVERS: $EXTERNAL_NET
    DC_SERVERS: $HOME_NET
    DNP3_SERVER: $HOME_NET
    DNP3_CLIENT: $HOME_NET
    MODBUS_CLIENT: $HOME_NET
    MODBUS_SERVER: $HOME_NET
    ENIP_CLIENT: $HOME_NET
    ENIP_SERVER: $HOME_NET
  port-groups:
    HTTP_PORTS: '80'
    SHELLCODE_PORTS: '!80'
    ORACLE_PORTS: 1521
    SSH_PORTS: 22
    DNP3_PORTS: 20000
    MODBUS_PORTS: 502
    FILE_DATA_PORTS: '[$HTTP_PORTS,110,143]'
    FTP_PORTS: 21
    GENEVE_PORTS: 6081
    VXLAN_PORTS: 4789
    TEREDO_PORTS: 3544
    SIP_PORTS: '[5060, 5061]'
default-log-dir: /var/log/suricata/
stats:
  enabled: true
  interval: 8
  exception-policy: null
plugins: null
outputs:
- fast:
    enabled: true
    filename: fast.log
    append: true
- eve-log:
    enabled: true
    filetype: regular
    filename: eve.json
    pcap-file: false
    community-id: false
    community-id-seed: 0
    xff:
      enabled: false
      mode: extra-data
      deployment: reverse
      header: X-Forwarded-For
    types:
    - alert:
        tagged-packets: true
    - frame:
        enabled: false
    - anomaly:
        enabled: true
        types: null
    - http:
        extended: true
    - dns: null
    - mdns: null
    - tls:
        extended: true
    - files:
        force-magic: false
    - smtp: null
    - websocket
    - ftp
    - rdp
    - nfs
    - smb: null
    - tftp
    - ike
    - dcerpc
    - krb5
    - bittorrent-dht
    - snmp
    - rfb
    - sip
    - quic
    - ldap
    - pop3
    - arp:
        enabled: false
    - dhcp:
        enabled: true
        extended: false
    - ssh
    - mqtt: null
    - http2
    - doh2
    - pgsql:
        enabled: false
    - stats:
        totals: true
        threads: false
        deltas: false
    - flow
- tls-store:
    enabled: false
- pcap-log:
    enabled: false
    filename: log.pcap
    limit: 1000mb
    max-files: 2000
    compression: none
    mode: normal
    use-stream-depth: false
    honor-pass-rules: false
- alert-debug:
    enabled: false
    filename: alert-debug.log
    append: true
- stats:
    enabled: true
    filename: stats.log
    append: true
    totals: true
    threads: false
- file-store:
    version: 2
    enabled: false
    xff:
      enabled: false
      mode: extra-data
      deployment: reverse
      header: X-Forwarded-For
- tcp-data:
    enabled: false
    type: file
    filename: tcp-data.log
- http-body-data:
    enabled: false
    type: file
    filename: http-data.log
- lua:
    enabled: false
    scripts: null
heartbeat: null
logging:
  default-log-level: notice
  default-output-filter: null
  outputs:
  - console:
      enabled: true
  - file:
      enabled: true
      level: info
      filename: suricata.log
  - syslog:
      enabled: false
      facility: local5
      format: '[%i] <%d> -- '
af-packet:
- interface: enx00e04c680be1
  cluster-id: 99
  cluster-type: cluster_flow
  defrag: true
af-xdp:
- interface: default
dpdk:
  eal-params:
    proc-type: primary
  interfaces:
  - interface: 0000:3b:00.0
    threads: auto
    promisc: true
    multicast: true
    checksum-checks: true
    checksum-checks-offload: true
    mtu: 1500
    vlan-strip-offload: false
    mempool-size: auto
    mempool-cache-size: auto
    rx-descriptors: auto
    tx-descriptors: auto
    copy-mode: none
    copy-iface: none
  - interface: default
    threads: auto
    promisc: true
    multicast: true
    checksum-checks: true
    checksum-checks-offload: true
    mtu: 1500
    vlan-strip-offload: false
    rss-hash-functions: auto
    linkup-timeout: 0
    mempool-size: auto
    mempool-cache-size: auto
    rx-descriptors: auto
    tx-descriptors: auto
    copy-mode: none
    copy-iface: none
pcap:
- interface: enx00e04c680be1
  checksum-checks: false
- interface: default
pcap-file:
  checksum-checks: false
app-layer:
  protocols:
    telnet:
      enabled: true
    rfb:
      enabled: true
      detection-ports:
        dp: 5900, 5901, 5902, 5903, 5904, 5905, 5906, 5907, 5908, 5909
    mqtt:
      enabled: true
    krb5:
      enabled: true
    bittorrent-dht:
      enabled: true
    snmp:
      enabled: true
    ike:
      enabled: true
    tls:
      enabled: true
      detection-ports:
        dp: 443
    pgsql:
      enabled: true
      stream-depth: 0
    dcerpc:
      enabled: true
    ftp:
      enabled: true
    websocket: null
    rdp: null
    ssh:
      enabled: true
    doh2:
      enabled: true
    http2:
      enabled: true
    smtp:
      enabled: true
      raw-extraction: false
      mime:
        decode-mime: true
        decode-base64: true
        decode-quoted-printable: true
        header-value-depth: 2000
        extract-urls: true
        body-md5: false
      inspected-tracker:
        content-limit: 100000
        content-inspect-min-size: 32768
        content-inspect-window: 4096
    imap:
      enabled: detection-only
    pop3:
      enabled: true
      detection-ports:
        dp: 110
      stream-depth: 0
    smb:
      enabled: true
      detection-ports:
        dp: 139, 445
    nfs:
      enabled: true
    tftp:
      enabled: true
    dns:
      tcp:
        enabled: true
        detection-ports:
          dp: 53
      udp:
        enabled: true
        detection-ports:
          dp: 53
    http:
      enabled: true
      memcap: 64mb
      force-body: true
      request-body-limit: 10mb
      libhtp:
        default-config:
          personality: IDS
          request-body-limit: 100kb
          response-body-limit: 100kb
          request-body-minimal-inspect-size: 32kb
          request-body-inspect-window: 4kb
          response-body-minimal-inspect-size: 40kb
          response-body-inspect-window: 16kb
          response-body-decompress-layer-limit: 2
          http-body-inline: auto
          swf-decompression:
            enabled: false
            type: both
            compress-depth: 100kb
            decompress-depth: 100kb
          double-decode-path: false
          double-decode-query: false
        server-config: null
    modbus:
      enabled: false
      detection-ports:
        dp: 502
      stream-depth: 0
    dnp3:
      enabled: false
      detection-ports:
        dp: 20000
    enip:
      enabled: false
      detection-ports:
        dp: 44818
        sp: 44818
    ntp:
      enabled: true
    quic:
      enabled: true
    dhcp:
      enabled: true
    sip: null
    ldap:
      tcp:
        enabled: true
        detection-ports:
          dp: 389, 3268
      udp:
        enabled: true
        detection-ports:
          dp: 389, 3268
    mdns:
      enabled: true
asn1-max-frames: 256
datasets:
  defaults: null
  limits: null
  rules: null
security:
  limit-noproc: true
  landlock:
    enabled: false
    directories:
      read:
      - /usr/
      - /etc/
      - /etc/suricata/
  lua: null
coredump:
  max-dump: unlimited
host-mode: auto
unix-command:
  enabled: auto
legacy:
  uricontent: enabled
exception-policy: auto
engine-analysis:
  rules-fast-pattern: true
  rules: true
pcre:
  match-limit: 3500
  match-limit-recursion: 1500
host-os-policy:
  windows:
  - 0.0.0.0/0
  bsd: []
  bsd-right: []
  old-linux: []
  linux: []
  old-solaris: []
  solaris: []
  hpux10: []
  hpux11: []
  irix: []
  macos: []
  vista: []
  windows2k3: []
defrag:
  memcap: 32mb
  hash-size: 65536
  trackers: 65535
  max-frags: 65535
  prealloc: true
  timeout: 60
flow:
  memcap: 128mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30
vlan:
  use-for-tracking: true
livedev:
  use-for-tracking: true
flow-timeouts:
  default:
    new: 30
    established: 300
    closed: 0
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-closed: 0
    emergency-bypassed: 50
  tcp:
    new: 60
    established: 600
    closed: 60
    bypassed: 100
    emergency-new: 5
    emergency-established: 100
    emergency-closed: 10
    emergency-bypassed: 50
  udp:
    new: 30
    established: 300
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-bypassed: 50
  icmp:
    new: 30
    established: 300
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-bypassed: 50
stream:
  memcap: 64mb
  checksum-validation: true
  inline: auto
  reassembly:
    urgent:
      policy: oob
      oob-limit-policy: drop
    memcap: 256mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560
    randomize-chunk-size: true
host:
  hash-size: 4096
  prealloc: 1000
  memcap: 32mb
decoder:
  teredo:
    enabled: true
    ports: $TEREDO_PORTS
  vxlan:
    enabled: true
    ports: $VXLAN_PORTS
  geneve:
    enabled: true
    ports: $GENEVE_PORTS
  recursion-level:
    use-for-tracking: true
detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto
  sgh-mpm-caching: true
  sgh-mpm-caching-path: /var/lib/suricata/cache/sgh
  prefilter:
    default: mpm
  grouping: null
  thresholds:
    hash-size: 16384
    memcap: 16mb
  profiling:
    grouping:
      dump-to-disk: false
      include-rules: false
      include-mpm-stats: false
mpm-algo: auto
spm-algo: auto
threading:
  set-cpu-affinity: false
  autopin: false
  cpu-affinity:
    management-cpu-set:
      cpu:
      - 0
    receive-cpu-set:
      cpu:
      - 0
    worker-cpu-set:
      cpu:
      - all
      mode: exclusive
      prio:
        low:
        - 0
        medium:
        - 1-2
        high:
        - 3
        default: medium
      interface-specific-cpu-set:
      - interface: enp4s0f0
        cpu:
        - 1
        - 3
        - 5
        - 7
        - 9
        mode: exclusive
        prio:
          high:
          - all
          default: medium
  detect-thread-ratio: 1.0
profiling:
  rules:
    enabled: true
    filename: rule_perf.log
    append: true
    limit: 10
    json: true
  keywords:
    enabled: true
    filename: keyword_perf.log
    append: true
  prefilter:
    enabled: true
    filename: prefilter_perf.log
    append: true
  rulegroups:
    enabled: true
    filename: rule_group_perf.log
    append: true
  packets:
    enabled: true
    filename: packet_stats.log
    append: true
    csv:
      enabled: false
      filename: packet_stats.csv
  locks:
    enabled: false
    filename: lock_stats.log
    append: true
  pcap-log:
    enabled: false
    filename: pcaplog_stats.log
    append: true
nfq: null
nflog:
- group: 2
  buffer-size: 18432
- group: default
  qthreshold: 1
  qtimeout: 100
  max-size: 20000
capture: null
netmap:
- interface: eth2
- interface: default
pfring:
- interface: eth0
  threads: auto
  cluster-id: 99
  cluster-type: cluster_flow
- interface: default
ipfw: null
napatech:
  streams:
  - 0-3
  enable-stream-stats: false
  auto-config: true
  hardware-bypass: true
  inline: false
  ports:
  - 0-1
  - 2-3
  hashmode: hash5tuplesorted
default-rule-path: /var/lib/suricata/rules
rule-files:
- local.rules
- brute-force-ssh.rules
- dns-tunneling.rules
- dos-http.rules
- ping-flood.rules
- sql-injection.rules
- fin-flood.rules
- rst-flood.rules
- psh-flood.rules
- web-simple-scanner.rules
- web-wide-scanner.rules
- icmp-tunnel.rules
- port-scanner.rules
- dhcp-starvation.rules
- brute-force-telnet.rules
- syn-flood.rules
- coap-get-flood.rules
- coap-response-fuzz.rules
- coap-resource-exhaustion.rules
- coap-token-collision.rules
- zenoh-fragments-reassembly.rules
- zenoh-pico-keepalive-flood.rules
- zenoh-pico-memory-exhaustion.rules
- zenoh-pico-sequence-exhaustion.rules
- zenoh-pico-timestamp-manipulation.rules
- zenoh-pico-proto-fuzzer.rules
- ssl-heartbleed.rules
- xss-scanner.rules
- path-traversal.rules
- ping-sweep.rules
- xrce.rules
- snmp-scanner.rules
- mqtt-qos-amplification.rules
- mqtt-publisher-flood.rules
- mqtt-lwt-abuse.rules
- mqtt-bruteforce.rules
- udp-flood.rules
- idor-url-parameter.rules
- ipv6-ra-flood.rules
- ipv6-ns-flood.rules
- ipv6-mld-flood.rules
classification-file: /etc/suricata/classification.config
reference-config-file: /etc/suricata/reference.config
firewall: null
